<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Congress Critter — Full Test Suite</title>
  <style>
    body { font-family: monospace; margin: 1rem; background: #111; color: #eee; }
    .pass { color: #4f4; }
    .fail { color: #f44; font-weight: bold; }
    .group { color: #8cf; margin-top: 1.5em; font-size: 1.1em; }
    #summary { margin-top: 2em; padding: 1em; border-top: 1px solid #444; font-size: 1.2em; }
  </style>
</head>
<body>
<h2>Congress Critter — Full Test Suite</h2>
<div id="log"></div>
<div id="summary"></div>

<!-- Replicate the full DOM structure from index.html -->
<div style="display:none">
  <button id="geolocate-btn" type="button">Use My Location</button>
  <form id="address-form">
    <input type="text" id="address-input" name="address" required>
    <button type="submit">Find</button>
  </form>
  <section id="status" hidden>
    <article aria-busy="true" id="loading">
      <span id="loading-message">Looking up your representatives…</span>
    </article>
    <article id="error" hidden>
      <p id="error-message"></p>
      <button id="retry-btn" type="button">Try Again</button>
    </article>
  </section>
  <section id="results" hidden>
    <nav class="results-nav" aria-label="Jump to section">
      <a href="#usrep">Representative</a>
      <a href="#senators">Senators</a>
      <a href="#stateleg">State</a>
    </nav>
    <div id="usrep" class="result-section">
      <details class="section-details" open>
        <summary class="section-title">U.S. Representative</summary>
        <div class="section-body"></div>
      </details>
    </div>
    <div id="senators" class="result-section">
      <details class="section-details">
        <summary class="section-title">U.S. Senators</summary>
        <div class="section-body"></div>
      </details>
    </div>
    <div id="stateleg" class="result-section">
      <details class="section-details">
        <summary class="section-title">State Legislature</summary>
        <div class="section-body"></div>
      </details>
    </div>
  </section>
</div>

<script src="harness.js"></script>
<script src="test-geocoder.js"></script>
<script src="test-legislators.js"></script>
<script src="test-state-legislators.js"></script>
<script src="test-ui.js"></script>
<script>
Harness.runAll();
</script>
</body>
</html>
